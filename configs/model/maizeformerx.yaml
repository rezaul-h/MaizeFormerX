model:
  name: "maizeformerx"
  family: "vit"
  pretrained: false
  num_classes: null
  in_channels: 3
  image_size: 224
  dropout: 0.30
  drop_path: 0.10

  patch_embed:
    type: "multi_scale"
    patch_sizes: [8, 16, 32]
    strides: [8, 16, 32]
    embed_dims: [64, 96, 128]
    use_conv_projection: true
    flatten: true
    norm_layer: "layernorm"

  fusion:
    type: "csaf"
    input_dims: [64, 96, 128]
    fusion_dim: 192
    num_heads: 4
    qkv_bias: true
    attn_dropout: 0.10
    proj_dropout: 0.10
    residual: true

  encoder:
    depth: 6
    embed_dim: 192
    num_heads: 6
    mlp_ratio: 4.0
    qkv_bias: true
    proj_dropout: 0.10
    attn_dropout: 0.10
    layer_scale: false
    norm_layer: "layernorm"

  classifier:
    pooling: "cls"
    hidden_dim: 192
    head_dropout: 0.30

  init:
    scheme: "trunc_normal"
    std: 0.02