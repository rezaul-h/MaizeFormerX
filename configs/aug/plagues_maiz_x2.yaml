augmentation:
  name: "plagues_maiz_x2"
  dataset: "plagues_maiz"
  expansion_factor: 2

train:
  resize: [224, 224]
  horizontal_flip:
    p: 0.50
  vertical_flip:
    p: 0.15
  rotation:
    degrees: 18
    p: 0.50
  random_resized_crop:
    size: 224
    scale: [0.85, 1.00]
    ratio: [0.90, 1.10]
    p: 0.45
  color_jitter:
    brightness: 0.20
    contrast: 0.20
    saturation: 0.15
    hue: 0.03
    p: 0.45
  affine:
    translate: [0.05, 0.05]
    scale: [0.95, 1.05]
    shear: 5
    p: 0.20
  gaussian_blur:
    kernel_size: 3
    sigma: [0.1, 1.2]
    p: 0.12
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

val_test:
  resize: [224, 224]
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]