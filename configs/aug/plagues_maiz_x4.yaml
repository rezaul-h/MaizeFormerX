augmentation:
  name: "plagues_maiz_x4"
  dataset: "plagues_maiz"
  expansion_factor: 4

train:
  resize: [224, 224]
  horizontal_flip:
    p: 0.50
  vertical_flip:
    p: 0.20
  rotation:
    degrees: 24
    p: 0.60
  random_resized_crop:
    size: 224
    scale: [0.80, 1.00]
    ratio: [0.88, 1.12]
    p: 0.55
  color_jitter:
    brightness: 0.25
    contrast: 0.25
    saturation: 0.20
    hue: 0.04
    p: 0.55
  affine:
    translate: [0.08, 0.08]
    scale: [0.92, 1.08]
    shear: 8
    p: 0.25
  gaussian_blur:
    kernel_size: 5
    sigma: [0.1, 1.5]
    p: 0.18
  random_erasing:
    p: 0.10
    scale: [0.02, 0.10]
    ratio: [0.3, 3.3]
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

val_test:
  resize: [224, 224]
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]