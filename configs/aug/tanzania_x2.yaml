augmentation:
  name: "tanzania_x4"
  dataset: "tanzania"
  expansion_factor: 4

train:
  resize: [224, 224]
  horizontal_flip:
    p: 0.50
  vertical_flip:
    p: 0.10
  rotation:
    degrees: 18
    p: 0.55
  random_resized_crop:
    size: 224
    scale: [0.82, 1.00]
    ratio: [0.88, 1.12]
    p: 0.45
  color_jitter:
    brightness: 0.18
    contrast: 0.18
    saturation: 0.14
    hue: 0.03
    p: 0.45
  affine:
    translate: [0.05, 0.05]
    scale: [0.94, 1.06]
    shear: 5
    p: 0.18
  gaussian_blur:
    kernel_size: 3
    sigma: [0.1, 1.2]
    p: 0.12
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

val_test:
  resize: [224, 224]
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]