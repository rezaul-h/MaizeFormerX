augmentation:
  name: "dataverse_x2"
  dataset: "dataverse"
  expansion_factor: 2

train:
  resize: [224, 224]
  horizontal_flip:
    p: 0.50
  vertical_flip:
    p: 0.10
  rotation:
    degrees: 15
    p: 0.50
  random_resized_crop:
    size: 224
    scale: [0.85, 1.00]
    ratio: [0.90, 1.10]
    p: 0.40
  color_jitter:
    brightness: 0.15
    contrast: 0.15
    saturation: 0.10
    hue: 0.02
    p: 0.40
  gaussian_blur:
    kernel_size: 3
    sigma: [0.1, 1.0]
    p: 0.10
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

val_test:
  resize: [224, 224]
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]