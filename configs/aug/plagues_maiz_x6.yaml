augmentation:
  name: "plagues_maiz_x6"
  dataset: "plagues_maiz"
  expansion_factor: 6

train:
  resize: [224, 224]
  horizontal_flip:
    p: 0.50
  vertical_flip:
    p: 0.25
  rotation:
    degrees: 28
    p: 0.65
  random_resized_crop:
    size: 224
    scale: [0.75, 1.00]
    ratio: [0.85, 1.15]
    p: 0.60
  color_jitter:
    brightness: 0.30
    contrast: 0.30
    saturation: 0.24
    hue: 0.05
    p: 0.60
  affine:
    translate: [0.10, 0.10]
    scale: [0.88, 1.10]
    shear: 10
    p: 0.30
  gaussian_blur:
    kernel_size: 5
    sigma: [0.1, 1.8]
    p: 0.22
  random_erasing:
    p: 0.15
    scale: [0.02, 0.12]
    ratio: [0.3, 3.3]
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

val_test:
  resize: [224, 224]
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]