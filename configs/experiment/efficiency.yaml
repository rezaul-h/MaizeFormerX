experiment:
  name: "efficiency_profiling"
  type: "efficiency"

datasets:
  - "dataverse"

models:
  - "maizeformerx"
  - "mobilevit"
  - "efficientformer"
  - "tinyvit"
  - "swinv2"
  - "shufflenetv2"
  - "ghostnet"
  - "mobilenetv3"
  - "efficientnet_b0"
  - "efficientnet_b1"
  - "mixmobilenet"

profiling:
  input_size: [1, 3, 224, 224]
  measure_params: true
  measure_flops: true
  measure_cpu_latency: true
  measure_gpu_latency: true
  measure_peak_memory: true
  cpu_threads: 1
  warmup_iterations: 20
  benchmark_iterations: 100
  use_fp16_gpu: true

export:
  save_csv: true
  save_json: true
  save_table: true